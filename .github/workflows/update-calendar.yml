name: Actualizar calendario Mundial 2026

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: mundial2026-calendar
  cancel-in-progress: true

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar actualización
        run: python update_calendar.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/mundial2026.ics

          if git diff --cached --quiet; then
            echo "Sin cambios"
            exit 0
          fi

          git commit -m "Actualizar calendario Mundial 2026 [skip ci]"
          git push